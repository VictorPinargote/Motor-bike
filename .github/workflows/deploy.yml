name: 🚀 Deploy Motor-biker Backend to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "."
          target: "/opt/motor-biker-backend"

      - name: Run deploy commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e
            cd /opt/motor-biker-backend

            sudo lsof -t -i:3000 | xargs -r sudo kill -9 || true

            printf "%s" "${{ secrets.ENV_FILE }}" > .env

            npm install
            npm run build

            pm2 stop motor-biker-api || true
            pm2 delete motor-biker-api || true
            pm2 start dist/main.js --name motor-biker-api
            pm2 save
